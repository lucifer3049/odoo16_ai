name: Release (GHCR)

# 打版本 tag（v*）或手動執行時，build Docker image 並推到 GitHub Container Registry，
# 同時自動建立 GitHub Release。完全使用內建 GITHUB_TOKEN，無需任何額外密鑰。
on:
  push:
    tags: ['v*']
  workflow_dispatch:

jobs:
  publish:
    name: Build → GHCR + GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write   # 建立 Release
      packages: write   # 推送 image 到 GHCR

    steps:
      - uses: actions/checkout@v4

      - name: 登入 GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build 並推送 image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}:latest

      - name: 建立 GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
