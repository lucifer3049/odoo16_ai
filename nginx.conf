# Odoo 16 反向代理：一般請求 → HTTP worker(8069)，websocket → gevent worker(8072)。
# 多進程（workers>0，queue_job 需要）模式下，bus 即時推送走 websocket，必須由此處
# 把 /websocket 導到 gevent worker，否則前端收不到串流 delta。
upstream odoo      { server web:8069; }
upstream odoochat  { server web:8072; }

server {
    listen 80;
    client_max_body_size 200M;

    # bus 即時推送（串流逐字輸出靠它）
    location /websocket {
        proxy_pass http://odoochat;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    location / {
        proxy_pass http://odoo;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
