[options]
; ── Addons 路徑 ───────────────────────────────────────────────────────────
; /opt/oca：image 內 vendor 的 OCA 模組（queue_job）。放這裡而非 /mnt/extra-addons，
; 因為 compose 的 bind mount (./addons:/mnt/extra-addons) 會把 image 內的同名目錄蓋掉。
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/opt/oca,/mnt/extra-addons

; ── server_wide_modules ───────────────────────────────────────────────────
; queue_job 必須在這裡載入，jobrunner 才會在多進程模式下自動啟動。
server_wide_modules = base,web,queue_job

; ── 多進程 / worker ───────────────────────────────────────────────────────
; workers > 0 才會啟用 (a) queue_job 的 jobrunner (b) gevent worker（bus 即時推送）。
; 注意：每個 worker 是獨立 process，會各自載入本模組與 embedding 模型 → 吃 RAM。
;       CPU-only 單機請依實際記憶體調整，勿盲目調大。
workers = 2
max_cron_threads = 1

; ── 記憶體上限（重要！）─────────────────────────────────────────────────────
; prefork（workers>0）模式下，Odoo 預設對每個 worker 套用 RLIMIT_AS（虛擬記憶體上限，
; 約 2.5GB）。但 torch / sentence-transformers 保留的「虛擬」位址空間遠超此值，會在
; 載入 .so 時觸發 "failed to map segment from shared object"（mmap 失敗）而崩潰。
; 設為 0 解除上限（等同 threaded 模式本來就沒有限制的行為）。注意這是「虛擬」位址空間，
; 設高不會吃掉實體 RAM；實體 RAM 的保護改靠 workers 數量控制。
limit_memory_soft = 0
limit_memory_hard = 0

; bus（websocket）走 gevent worker；由 nginx（見 nginx.conf）把 /websocket 導到此 port。
gevent_port = 8072

; 信任反向代理（nginx）帶來的 X-Forwarded-* 標頭，websocket / 真實 IP 才正確。
proxy_mode = True

; 單次請求時間上限（秒）。LLM job 可能較久，放寬避免被 limit_time_real 砍掉。
limit_time_real = 300
limit_time_cpu = 240

; ── queue_job channel 設定 ────────────────────────────────────────────────
; 依 provider 分流（見 Phase 2 的 job 派送邏輯）：
;   root.cloud     ：雲端 API（OpenAI/Gemini/Claude/Groq）—— I/O 等待為主，可多併發
;   root.local_llm ：本機 Ollama —— CPU 推論，capacity=1 一次只跑一個，天然限流保護 CPU
; root 的 capacity 需 ≥ 兩個子 channel 的併發總和。
; 目前保守設定（搭配 workers=2）：同時最多 1 個 job 執行，留 1 個 worker 給互動請求。
; 加大 RAM / workers 後可再放大 cloud 容量提升雲端併發。
[queue_job]
channels = root:1,root.cloud:1,root.local_llm:1
